# Uncomment the following line to enable OLED Displays
CONFIG_ZMK_DISPLAY=y

# Throttle pointer report rate 125Hz -> ~83Hz to ease split-link load.
# Mitigates the left-half (scroll peripheral) hang triggered by heavy scrolling.
CONFIG_ZMK_INPUT_PROCESSOR_REPORT_RATE_LIMIT_DEFAULT=12

# Source-level throttle: accumulate sensor motion into fewer over-the-air packets
# (driver default 0 = a packet per interrupt floods the split link on scroll).
# Overrides the shield's per-side crosses_left/right.conf which set this to 0.
CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=12
